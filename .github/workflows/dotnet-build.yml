name: .NET Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore OptimiRutas.slnx
      - name: Build solution
        run: dotnet build OptimiRutas.slnx --configuration Release --no-restore
      - name: Run tests
        run: dotnet test OptimiRutas.slnx --configuration Release --no-build --verbosity normal
