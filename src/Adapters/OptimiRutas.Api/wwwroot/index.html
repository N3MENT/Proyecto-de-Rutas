<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OptimiRutas - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="24" fill="#1a73e8"/>
                    <path d="M14 34L24 14L34 34H14Z" fill="white" stroke="white" stroke-width="2"/>
                    <circle cx="24" cy="28" r="3" fill="#1a73e8"/>
                </svg>
            </div>
            <h1>OptimiRutas</h1>
            <p>Encuentra la mejor ruta a tu destino</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
                <button class="tab-btn" data-tab="register">Registrarse</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="error-msg hidden"></div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regName">Nombre completo</label>
                    <input type="text" id="regName" placeholder="Nombre y apellido" required minlength="3" title="Ingresa tu nombre y apellido (solo letras, mínimo 3 caracteres)">
                </div>
                <div class="form-group">
                    <label for="regEmail">Correo electrónico</label>
                    <input type="email" id="regEmail" placeholder="tu@email.com" required title="Ingresa un correo válido (ej: usuario@dominio.com)">
                </div>
                <div class="form-group">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" placeholder="Mín. 8 caracteres, 1 mayús., 1 minús., 1 número" minlength="8" required title="Mínimo 8 caracteres: 1 mayúscula, 1 minúscula y 1 número">
                </div>
                <div id="registerError" class="error-msg hidden"></div>
                <div id="registerSuccess" class="success-msg hidden"></div>
                <button type="submit" class="btn-primary">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
